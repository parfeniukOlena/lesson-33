<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid-layout{
            display: grid;
            grid-template-columns: 200px 1fr ;
            grid-template-rows: 70px 1fr 50px;  
            grid-template-areas: 
                " header header    "
                " sidebar content  "
                " footer footer    "
            ;
            height: 100vh;
        }

        .header{
            grid-area: header;
            background-color: green;
            color: white;
            grid-column: 1 / 3;
        }
        .sidebar{
            grid-area: sidebar;
            background-color: rgb(224, 233, 233);
            
        }
        .content{
            grid-area: content;
            background-color: rgb(192, 202, 202);

        }
        .footer{
            grid-area: footer;
            grid-column: 1 / 3;
            background-color: rgb(19, 18, 18);
            color: white;
        }
        .header p,.footer p{
            text-align: center;
        }

        button{
            background-color: rgb(25, 177, 219);
            color: white;
            padding: 10px 35px ;
            border-radius: 5px;
        }

    </style>
</head>
<body>
    <div class="grid-layout">

        <div class="header box">
            <p>HEADER</p>
        </div>
        <div class="sidebar box">
            <p>SIDEBAR</p>
            <ul>
                <li>Пункт 1</li>
                <li>Пункт 2</li>
                <li>Пункт 3</li>
            </ul>
                
        </div>
        <div class="content box">
            <p>CONTENT</p>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>4</button>
            <button>5</button>
        </div>
        <div class="footer box">
            <p>FOOTER</p>
        </div>
        
    </div>
</body>
</html>
